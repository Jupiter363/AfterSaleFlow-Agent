# 文件作用：服务配置文件，定义代理、网关或中间件的运行规则。
# 说明：本注释用于帮助读者先了解文件用途，再修改具体配置。

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream frontend_upstream {
    server frontend:5173;
}

upstream java_api_upstream {
    server java-api-service:8080;
}

upstream langfuse_upstream {
    server langfuse:3000;
}

upstream litellm_upstream {
    server litellm-proxy:4000;
}

server {
    listen 80;
    client_max_body_size 25m;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /internal/ {
        return 404;
    }

    location ^~ /agent-api/ {
        return 404;
    }

    location ^~ /ocr-api/ {
        return 404;
    }

    location ~ ^/api/disputes/.*/events$ {
        proxy_pass http://java_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 4h;
    }

    location ~ ^/api/agent-runs/[^/]+/events$ {
        proxy_pass http://java_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 4h;
    }

    location /api/ {
        proxy_pass http://java_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /observability/ {
        proxy_pass http://langfuse_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /llm-admin/ {
        proxy_pass http://litellm_upstream/;
        proxy_set_header Authorization "";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
