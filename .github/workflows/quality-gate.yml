name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  static-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Secret scan / secret scanning
        run: |
          ! grep -RInE 'sk-(phase[0-9]+|live|prod)|BEGIN PRIVATE KEY|DEEPSEEK_API_KEY=sk-' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=target --exclude-dir=dist .

      - name: Static repository contracts
        run: python -m pytest tests/static -q

      - name: Java tests
        working-directory: java-api-service
        run: ./mvnw -s .mvn/settings.xml -B -ntp test

      - name: Python Agent tests
        working-directory: python-agent-service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: OCR Parser tests
        working-directory: ocr-parser-service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: Frontend tests and build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Docker compose config
        run: docker compose config --quiet

  compose-smoke:
    runs-on: ubuntu-latest
    needs: static-and-unit
    steps:
      - uses: actions/checkout@v4
      - name: Build and start Compose stack
        env:
          DEEPSEEK_API_KEY: sk-ci-placeholder
          DEFAULT_LLM_API_BASE: http://127.0.0.1:9
        run: docker compose up -d --build --wait --wait-timeout 360
      - name: Smoke test
        env:
          DEEPSEEK_API_KEY: sk-ci-placeholder
          DEFAULT_LLM_API_BASE: http://127.0.0.1:9
        run: ./scripts/smoke-test.sh
      - name: API, E2E, and load smoke tests
        run: python -m pytest tests/api tests/e2e tests/load -q
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 200
      - name: Stop stack
        if: always()
        run: docker compose down --volumes --remove-orphans
