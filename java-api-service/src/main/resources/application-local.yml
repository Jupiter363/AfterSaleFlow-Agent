# 文件作用：Java API 服务代码文件，承载售后争议后端业务、持久化或集成逻辑。
# 说明：本注释用于帮助读者先了解配置用途，再修改具体配置项。

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgresql}:${POSTGRES_PORT:5432}/${JAVA_DB_NAME:dispute_system}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3s
  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://elasticsearch:9200}

app:
  env: ${APP_ENV:local}
  security:
    service-secret: ${JAVA_SERVICE_SECRET}
  agent:
    base-url: ${PYTHON_AGENT_SERVICE_URL:http://127.0.0.1:18000}
    service-secret: ${PYTHON_AGENT_SERVICE_SECRET}
    timeout-ms: ${APP_AGENT_TIMEOUT_MS:300000}
  ocr:
    base-url: ${OCR_SERVICE_URL:http://127.0.0.1:18010}
    service-secret: ${OCR_SERVICE_SECRET}
    timeout-ms: 120000
    callback-base-url: ${OCR_CALLBACK_BASE_URL:${JAVA_API_SERVICE_URL:http://java-api-service:8080}}
  temporal:
    address: ${TEMPORAL_ADDRESS:temporal-server:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${TEMPORAL_TASK_QUEUE:case-dispute-task-queue-v2}
    worker-enabled: ${APP_TEMPORAL_WORKER_ENABLED:true}
  approval:
    refund-threshold: ${APPROVAL_REFUND_THRESHOLD:500.00}
    reship-threshold: ${APPROVAL_RESHIP_THRESHOLD:300.00}
    review-timeout-hours: ${APPROVAL_REVIEW_TIMEOUT_HOURS:168}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ROOT_USER}
    secret-key: ${MINIO_ROOT_PASSWORD}
    evidence-original-bucket: ${MINIO_BUCKET_EVIDENCE_ORIGINAL:evidence-original}
    evidence-desensitized-bucket: ${MINIO_BUCKET_EVIDENCE_DESENSITIZED:evidence-desensitized}
  elasticsearch:
    url: ${ELASTICSEARCH_URL:http://elasticsearch:9200}
  feature:
    agent-intake-enabled: ${FEATURE_AGENT_INTAKE_ENABLED:true}
    agent-hearing-enabled: ${FEATURE_AGENT_HEARING_ENABLED:true}
    agent-evaluation-enabled: ${FEATURE_AGENT_EVALUATION_ENABLED:true}
    ocr-enabled: ${FEATURE_OCR_ENABLED:true}
    human-review-required: ${FEATURE_HUMAN_REVIEW_REQUIRED:true}
    tool-executor-simulation: ${FEATURE_TOOL_EXECUTOR_SIMULATION:true}
    auto-close-enabled: ${FEATURE_AUTO_CLOSE_ENABLED:true}
  logging:
    audit-enabled: ${ENABLE_AUDIT_LOG:true}
    sensitive-masking-enabled: ${ENABLE_SENSITIVE_LOG_MASKING:true}
