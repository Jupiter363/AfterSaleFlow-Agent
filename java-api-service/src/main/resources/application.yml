spring:
  application:
    name: java-api-service
  profiles:
    active: ${APP_ENV:local}
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

dispute:
  evidence-window: ${EVIDENCE_WINDOW:PT2H}
  hearing-window: ${HEARING_WINDOW:PT3H}
  max-hearing-rounds: ${MAX_HEARING_ROUNDS:3}
  sse-heartbeat: ${SSE_HEARTBEAT:PT15S}
  seed-demo-disputes: ${SEED_DEMO_DISPUTES:false}
