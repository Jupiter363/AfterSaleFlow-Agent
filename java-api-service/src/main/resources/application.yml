# 文件作用：Java API 服务代码文件，承载售后争议后端业务、持久化或集成逻辑。
# 说明：本注释用于帮助读者先了解配置用途，再修改具体配置项。

spring:
  application:
    name: java-api-service
  profiles:
    active: ${APP_ENV:local}
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

dispute:
  evidence-window: ${EVIDENCE_WINDOW:PT2H}
  hearing-window: ${HEARING_WINDOW:PT3H}
  hearing-party-stage-window: ${HEARING_PARTY_STAGE_WINDOW:PT20M}
  sse-heartbeat: ${SSE_HEARTBEAT:PT15S}
  seed-demo-disputes: ${SEED_DEMO_DISPUTES:false}
